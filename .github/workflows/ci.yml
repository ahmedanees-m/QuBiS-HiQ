name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-pinned.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pinned.txt

      - name: Install package
        run: |
          pip install -e .

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run syntax check on all Python files
        run: |
          python -m py_compile $(find . -name "*.py" -not -path "./.git/*")

      - name: Run propositions
        run: |
          python proofs/proposition1.py
          python proofs/proposition2.py
          python proofs/proposition3.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Lint with flake8
        run: |
          flake8 qubis_hiq/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 qubis_hiq/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  json-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate JSON files
        run: |
          python - <<'EOF'
import json
import os
import sys

errors = []
for root, dirs, files in os.walk('.'):
    for f in files:
        if f.endswith('.json'):
            path = os.path.join(root, f)
            try:
                with open(path) as fp:
                    json.load(fp)
            except json.JSONDecodeError as e:
                errors.append((path, str(e)))

if errors:
    print('JSON validation errors:')
    for path, err in errors:
        print(f'  {path}: {err}')
    sys.exit(1)
else:
    print('All JSON files are valid')
EOF
